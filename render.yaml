# Render blueprint — deploy with https://render.com/deploy or by creating
# a new Blueprint instance pointed at this repo's `deploy` branch.
services:
  - type: web
    name: tmdb-embed-api
    runtime: node
    plan: free
    branch: deploy
    healthCheckPath: /api/health
    buildCommand: npm install
    # Bake in the production config (proxy mode on) before starting, since the
    # filesystem is ephemeral and the admin panel can't persist settings here.
    # Run node directly — the upstream start script uses nodemon for admin-
    # triggered restarts, which we don't need in production.
    startCommand: cp render-config/user-config.json utils/user-config.json && node apiServer.js
    envVars:
      - key: TMDB_API_KEY
        sync: false # set in the Render dashboard (TMDB v3 API key)
      - key: API_PORT
        value: "10000"
